name: Maven CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          cache: maven

      - name: Compile and run tests
        run: mvn -q test

      - name: Package project
        run: mvn -q package

      - name: Check replay script syntax
        run: python -m py_compile scripts/replay_solution.py
